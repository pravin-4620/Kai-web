services:
  - type: web
    name: kai-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_ADMIN_SDK_JSON
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: JUDGE0_API_KEY
        sync: false
      - key: JUDGE0_API_URL
        sync: false
      - key: JWT_SECRET
        sync: false